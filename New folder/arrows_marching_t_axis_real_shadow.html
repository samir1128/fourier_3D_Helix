
<style>
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.root{font-family:var(--font-sans);padding:1rem 0;color:var(--color-text-primary)}
.ctrl{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:12px;font-size:13px;color:var(--color-text-secondary)}
.vbtn{padding:4px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-secondary);cursor:pointer;font-size:12px}
.vbtn.on{background:#534AB7;color:#EEEDFE;border-color:#534AB7}
.bg2{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);overflow:hidden}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
@media(max-width:500px){.row2{grid-template-columns:1fr}}
.panel{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:10px 12px}
.ptitle{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.callout{border-left:2px solid #7F77DD;padding:8px 14px;font-size:13px;color:var(--color-text-secondary);line-height:1.7;margin-top:12px}
.callout b{color:var(--color-text-primary);font-weight:500}
</style>

<div class="root">
<h2 class="sr-only">Visualization showing vector arrows marching along the t axis while rotating in the complex plane, and their real component casting a shadow that forms the Fourier wave</h2>

<div class="ctrl">
  <span>Reveal:</span>
  <button class="vbtn on" id="r0" onclick="setReveal(0)">1 arrow (n=1)</button>
  <button class="vbtn"    id="r1" onclick="setReveal(1)">+ n=3</button>
  <button class="vbtn"    id="r2" onclick="setReveal(2)">+ n=5</button>
  <button class="vbtn"    id="r3" onclick="setReveal(3)">+ n=7 (4 total)</button>
  <span style="margin-left:4px">View:</span>
  <button class="vbtn on" id="v0" onclick="setVangle(0)">3D perspective</button>
  <button class="vbtn"    id="v1" onclick="setVangle(1)">front (pure circles)</button>
  <button class="vbtn"    id="v2" onclick="setVangle(2)">top (real shadow)</button>
  <button class="vbtn" id="pb" onclick="togglePlay()" style="margin-left:4px">⏸</button>
</div>

<div class="bg2"><canvas id="main" style="width:100%;display:block" height="480"></canvas></div>

<div class="row2">
  <div class="panel">
    <div class="ptitle">Re wall — the shadow cast by the tip</div>
    <canvas id="rewall" height="110" style="width:100%;display:block"></canvas>
  </div>
  <div class="panel">
    <div class="ptitle">Im wall — discarded imaginary part</div>
    <canvas id="imwall" height="110" style="width:100%;display:block"></canvas>
  </div>
</div>

<div class="callout" id="box"></div>
</div>

<script>
const D=matchMedia('(prefers-color-scheme:dark)').matches;
const FG=D?'#c2c0b6':'#2c2c2a';
const FG2=D?'#666360':'#999790';
const GR=D?'#3a3836':'#dedad2';
const PUR='#7F77DD',TEAL='#1D9E75',AMB='#BA7517',COR='#D85A30',BLU='#378ADD';

const TERMS=[
  {n:1, a:4/Math.PI,     col:PUR},
  {n:3, a:4/(3*Math.PI), col:TEAL},
  {n:5, a:4/(5*Math.PI), col:AMB},
  {n:7, a:4/(7*Math.PI), col:COR},
];

let reveal=0, vangle=0, playing=true, T=0;
let yaw=0.52, pitch=0.28, tyaw=0.52, tpitch=0.28;
let drag=false, lx=0, ly=0;
let reShadow=[], imShadow=[], maxS=350;

function ha(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}

function setReveal(r){reveal=r;for(let i=0;i<4;i++)document.getElementById('r'+i).classList.toggle('on',i===r);reShadow=[];imShadow=[];updateBox();}
function setVangle(v){
  vangle=v;
  for(let i=0;i<3;i++)document.getElementById('v'+i).classList.toggle('on',i===v);
  if(v===1){tyaw=0;tpitch=0;}
  else if(v===2){tyaw=0;tpitch=Math.PI/2-0.01;}
  else{tyaw=0.52;tpitch=0.28;}
}
function togglePlay(){playing=!playing;document.getElementById('pb').textContent=playing?'⏸':'▶';}

function pr(x,y,z,yw,pt,cx,cy,sc){
  const cY=Math.cos(yw),sY=Math.sin(yw),cP=Math.cos(pt),sP=Math.sin(pt);
  const rx=x*cY-z*sY, rz2=x*sY+z*cY;
  const ry=y*cP-rz2*sP;
  return{sx:cx+rx*sc, sy:cy-ry*sc};
}

function getTip(tv, nterms){
  let rx=0,iy=0;
  for(let i=0;i<=nterms;i++){const h=TERMS[i];rx+=h.a*Math.cos(h.n*tv);iy+=h.a*Math.sin(h.n*tv);}
  return{re:rx,im:iy};
}

function getJoints(tv, nterms){
  let rx=0,iy=0;
  const pts=[{re:0,im:0}];
  for(let i=0;i<=nterms;i++){
    const h=TERMS[i];
    rx+=h.a*Math.cos(h.n*tv);
    iy+=h.a*Math.sin(h.n*tv);
    pts.push({re:rx,im:iy});
  }
  return pts;
}

const tSpan=Math.PI*2, tSteps=220;

function drawMain(){
  const el=document.getElementById('main');
  const dpr=devicePixelRatio||1, W=el.offsetWidth||560, H=480;
  if(el.width!==Math.round(W*dpr)){el.width=Math.round(W*dpr);el.height=Math.round(H*dpr);}
  const ctx=el.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);

  const cx=W/2, cy=H/2+20;
  const sc=Math.min(W,H)*0.17;
  const yw=yaw, pt=pitch;

  /* axes */
  const axcol=D?'#4a4844':'#c8c6be';
  [[[-2.2,0,0],[2.4,0,0],'Re'],[[ 0,-2.2,0],[0,2.4,0],'Im'],[[0,0,-tSpan/2-0.3],[0,0,tSpan/2+0.5],'t →']].forEach(([a,b,lbl])=>{
    const pa=pr(...a,yw,pt,cx,cy,sc), pb=pr(...b,yw,pt,cx,cy,sc);
    ctx.strokeStyle=axcol;ctx.lineWidth=0.5;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(pa.sx,pa.sy);ctx.lineTo(pb.sx,pb.sy);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=FG2;ctx.font='11px var(--font-sans)';ctx.fillText(lbl,pb.sx+4,pb.sy+4);
  });

  /* Re shadow wall — plane at Im=0, show Re vs t */
  const wallAlpha=0.13;
  ctx.strokeStyle=ha(TEAL,wallAlpha*3);ctx.lineWidth=0.8;
  const wallPts=[];
  for(let k=0;k<=tSteps;k++){
    const tv=-tSpan/2+tSpan*k/tSteps;
    const tip=getTip(tv,reveal);
    wallPts.push(pr(tip.re,0,tv,yw,pt,cx,cy,sc));
  }
  ctx.beginPath();
  wallPts.forEach((p,i)=>i===0?ctx.moveTo(p.sx,p.sy):ctx.lineTo(p.sx,p.sy));
  ctx.stroke();

  /* helix trails for each term */
  for(let i=0;i<=reveal;i++){
    const h=TERMS[i];
    let prev=null;
    for(let k=0;k<=tSteps;k++){
      const tv=-tSpan/2+tSpan*k/tSteps;
      const joints=getJoints(tv,i);
      const base=joints[i], tip=joints[i+1];
      const pb2=pr(base.re,base.im,tv,yw,pt,cx,cy,sc);
      const pt2=pr(tip.re,tip.im,tv,yw,pt,cx,cy,sc);
      const alpha=0.08+0.38*(k/tSteps);
      ctx.strokeStyle=ha(h.col,alpha);ctx.lineWidth=1.3;
      ctx.beginPath();ctx.moveTo(pb2.sx,pb2.sy);ctx.lineTo(pt2.sx,pt2.sy);ctx.stroke();
      if(prev){
        ctx.strokeStyle=ha(h.col,alpha*0.35);ctx.lineWidth=0.7;
        ctx.beginPath();ctx.moveTo(prev.sx,prev.sy);ctx.lineTo(pt2.sx,pt2.sy);ctx.stroke();
      }
      prev=pt2;
    }
  }

  /* current moment arrows */
  const joints=getJoints(T,reveal);
  for(let i=0;i<=reveal;i++){
    const h=TERMS[i];
    const base=joints[i], tip=joints[i+1];
    const pb2=pr(base.re,base.im,T,yw,pt,cx,cy,sc);
    const pt2=pr(tip.re,tip.im,T,yw,pt,cx,cy,sc);
    ctx.strokeStyle=h.col;ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(pb2.sx,pb2.sy);ctx.lineTo(pt2.sx,pt2.sy);ctx.stroke();
    const ang=Math.atan2(pt2.sy-pb2.sy,pt2.sx-pb2.sx);
    ctx.beginPath();
    ctx.moveTo(pt2.sx,pt2.sy);
    ctx.lineTo(pt2.sx-7*Math.cos(ang-0.42),pt2.sy-7*Math.sin(ang-0.42));
    ctx.lineTo(pt2.sx-7*Math.cos(ang+0.42),pt2.sy-7*Math.sin(ang+0.42));
    ctx.closePath();ctx.fillStyle=h.col;ctx.fill();
    ctx.fillStyle=FG2;ctx.font='11px var(--font-sans)';
    ctx.fillText('n='+h.n,pt2.sx+5,pt2.sy-3);
  }

  /* tip dot */
  const tipNow=joints[reveal+1];
  const tipP=pr(tipNow.re,tipNow.im,T,yw,pt,cx,cy,sc);
  ctx.beginPath();ctx.arc(tipP.sx,tipP.sy,5.5,0,Math.PI*2);
  ctx.fillStyle=BLU;ctx.fill();

  /* dashed drop to Re wall */
  const reP=pr(tipNow.re,0,T,yw,pt,cx,cy,sc);
  ctx.strokeStyle=ha(BLU,0.5);ctx.lineWidth=1;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(tipP.sx,tipP.sy);ctx.lineTo(reP.sx,reP.sy);ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();ctx.arc(reP.sx,reP.sy,3.5,0,Math.PI*2);
  ctx.fillStyle=BLU;ctx.fill();

  /* label */
  ctx.fillStyle=FG2;ctx.font='11px var(--font-sans)';
  ctx.fillText('drag to rotate',W-90,H-8);
  ctx.fillStyle=BLU;ctx.font='11px var(--font-mono)';
  ctx.fillText('Re(tip)='+tipNow.re.toFixed(2),8,18);
  ctx.fillStyle=ha(COR,0.8);
  ctx.fillText('Im(tip)='+tipNow.im.toFixed(2),8,32);
}

function drawWall(id, key, col, h){
  const el=document.getElementById(id);
  const dpr=devicePixelRatio||1, W=el.offsetWidth||200, H=h||110;
  if(el.width!==Math.round(W*dpr)){el.width=Math.round(W*dpr);el.height=Math.round(H*dpr);}
  const ctx=el.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);
  const pad={l:10,r:10,t:8,b:18}, pw=W-pad.l-pad.r, ph=H-pad.t-pad.b;
  const amp=1.4, N=300;

  ctx.strokeStyle=GR;ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(pad.l,pad.t+ph/2);ctx.lineTo(pad.l+pw,pad.t+ph/2);ctx.stroke();

  ctx.strokeStyle=col;ctx.lineWidth=1.5;
  ctx.beginPath();
  for(let k=0;k<=N;k++){
    const tv=-tSpan/2+tSpan*k/N;
    const tip=getTip(tv,reveal);
    const v=key==='re'?tip.re:tip.im;
    const x=pad.l+pw*k/N, y=pad.t+ph/2-v/amp*ph*0.44;
    k===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();

  const curTip=getTip(T,reveal);
  const curV=key==='re'?curTip.re:curTip.im;
  const cx2=pad.l+pw*((T+tSpan/2)/tSpan);
  const cy2=pad.t+ph/2-curV/amp*ph*0.44;
  ctx.strokeStyle=ha(col,0.4);ctx.lineWidth=1;ctx.setLineDash([2,2]);
  ctx.beginPath();ctx.moveTo(cx2,pad.t);ctx.lineTo(cx2,pad.t+ph);ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();ctx.arc(cx2,cy2,4,0,Math.PI*2);
  ctx.fillStyle=col;ctx.fill();

  ctx.fillStyle=FG2;ctx.font='10px var(--font-sans)';
  if(key==='re') ctx.fillText('this IS the signal f(t)',pad.l+4,pad.t+12);
  else ctx.fillText('discarded — not observed',pad.l+4,pad.t+12);
}

const mc=document.getElementById('main');
mc.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;});
window.addEventListener('mouseup',()=>drag=false);
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  tyaw+=(e.clientX-lx)*0.007; tpitch+=(e.clientY-ly)*0.007;
  tpitch=Math.max(-1.4,Math.min(1.4,tpitch));
  lx=e.clientX;ly=e.clientY;
  for(let i=0;i<3;i++)document.getElementById('v'+i).classList.remove('on');
  document.getElementById('v0').classList.add('on');
});
mc.addEventListener('touchstart',e=>{drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;},{passive:true});
window.addEventListener('touchend',()=>drag=false);
window.addEventListener('touchmove',e=>{
  if(!drag)return;
  tyaw+=(e.touches[0].clientX-lx)*0.007;tpitch+=(e.touches[0].clientY-ly)*0.007;
  tpitch=Math.max(-1.4,Math.min(1.4,tpitch));
  lx=e.touches[0].clientX;ly=e.touches[0].clientY;
},{passive:true});

function updateBox(){
  const msgs=[
    `<b>One arrow marching along t.</b> At every moment t, the single arrow e<sup>iωt</sup> lives in the complex plane — it has a Re component and an Im component. As t advances, the arrow both moves forward (along t) and rotates in the Re-Im plane simultaneously. The <b>teal curve on the Re wall</b> is the shadow cast by the tip straight down onto the Re axis — that is cos(t). The Im shadow (discarded) is sin(t).`,
    `<b>Two arrows chained, both marching.</b> At every t-slice, arrow n=3 is attached to the tip of arrow n=1 and rotates 3× faster. Both arrows march forward together. The shadow on the Re wall is now cos(t) + (1/3)cos(3t) — a better square wave. Notice the Im shadow also changes but we never use it for the real signal.`,
    `<b>Three arrows — n=1, 3, 5.</b> The compound tip traces an increasingly complex path in the (Re, Im) plane as it marches through t. The Re wall shadow is getting sharper corners. The Im components of all three arrows cancel partially — that cancellation is built into the Fourier coefficients automatically.`,
    `<b>Four arrows — approaching the square wave.</b> The Re shadow is recognisably square. The 3D object — this chain of rotating arrows sliding along the t axis — IS the Fourier series in physical form. The signal f(t) is literally just the real-axis shadow of this compound rotating structure. The imaginary part was never "thrown away" — it was never the signal to begin with. It is the scaffold that makes the rotation work.`
  ];
  document.getElementById('box').innerHTML=msgs[reveal];
}

function loop(){
  if(playing) T=(T+0.008)%(tSpan);
  yaw+=(tyaw-yaw)*0.08; pitch+=(tpitch-pitch)*0.08;
  drawMain();
  drawWall('rewall','re',BLU,110);
  drawWall('imwall','im',COR,110);
  requestAnimationFrame(loop);
}
updateBox();
loop();
</script>
